spring.application.name=auth-api
server.port=8080
server.servlet.context-path=/api

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3308/authdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Your_db_Password

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.defer-datasource-initialization=true

# Initialize database with roles
spring.sql.init.mode=always

# JWT Configuration
app.jwtSecret=mySuperSecretKeyForJWTTokenGeneration2026WithAtLeast256BitsLengthForHS512Algorithm
app.jwtExpirationMs=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.auth=DEBUG

# CORS
cors.allowed-origins=http://localhost:3000

# Server Configuration
server.error.include-message=always
server.error.include-binding-errors=always